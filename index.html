<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🎰 Casino Clau </title>

<style>
body{
  background:linear-gradient(135deg,#1a1a2e,#2d1b4e,#1a1a2e);
  color:#eee;
  text-align:center;
  font-family:Arial;
}

h2{ color:#ff4dc4; cursor:pointer; }

input{
  padding:10px;
  width:90px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#2a2a3d;
  color:white;
}

button{
  padding:10px 18px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#a64dff,#ff4dc4);
  color:white;
  cursor:pointer;
}

.reset{ background:#555; }

.bolillero{
  width:260px;
  height:260px;
  border-radius:50%;
  border:3px solid #ff4dc4;
  margin:20px auto;
  position:relative;
}

#puerta{
  width:60px;
  height:25px;
  background:#222;
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  border-radius:0 0 10px 10px;
  transition:0.3s;
  z-index: 10;
}

.puerta-abierta{
  height:5px;
}

.bolita{
  width:24px;
  height:24px;
  border-radius:50%;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:bold;
  color:black;
}

.roja{background:#ff4dc4;}
.azul{background:#a64dff;}
.verde{background:#ccc;}
.amarilla{background:#888;}

.bola1{transform:scale(2.2);}
.bola2{transform:scale(1.7);}
.bola3{transform:scale(1.3);}

@keyframes caer{
  0%{top:200px;}
  50%{top:310px;}
  70%{top:290px;}
  100%{top:305px;}
}

.resultados{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top: 60px;
}

.resultado{
  width:75px;
  height:75px;
  border-radius:50%;
  background:white;
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  box-shadow: 0 0 15px rgba(255, 77, 196, 0.5);
}

#mensajeClau{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 20px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<h2 ondblclick="pedirClave()">🎰 Casino Clau</h2>

<input type="number" id="desde" placeholder="Desde">
<input type="number" id="hasta" placeholder="Hasta">
<input type="number" id="cantidad" placeholder="Cantidad">

<button onclick="guardarRango()">Guardar</button>
<button class="reset" onclick="resetearTodo()">Reset</button>

<p id="listaNumeros"></p>

<div class="bolillero" id="bolillero">
  <div id="puerta"></div>
</div>

<button onclick="sortear()">Sortear</button>

<div class="resultados" id="resultados"></div>

<div id="mensajeClau">Bienvenida Clau 😏</div>

<script>

let numerosFijos=[123,456,789];
let cantidadGanadores=3;

let lista=JSON.parse(localStorage.getItem("bolas"))||[];
let girando=false;
let intervalo;

const bolillero=document.getElementById("bolillero");
const resultados=document.getElementById("resultados");
const puerta=document.getElementById("puerta");
const mensajeClau=document.getElementById("mensajeClau");

// 🔊 sonidos
const sonidoCaida = new Audio("https://www.soundjay.com/mechanical/sounds/mechanical-clunk-2.mp3");
const sonidoExplosion = new Audio("https://www.soundjay.com/explosion/sounds/explosion-01.mp3");
const sonidoGiro = new Audio("https://www.soundjay.com/machine/sounds/slot-machine-1.mp3");

sonidoGiro.loop = true;
sonidoExplosion.volume = 0.3;
sonidoGiro.volume = 0.2;

function renderLista(){
  listaNumeros.innerText = lista.length 
    ? "🎯 "+lista[0]+" ➤ "+lista[lista.length-1]+" | "+lista.length+" bolas en juego"
    : "(sin rango)";
}
renderLista();

function guardarRango(){
  let d=Number(desde.value);
  let h=Number(hasta.value);
  if(!d||!h||d>h) return;

  lista=[];
  for(let i=d;i<=h;i++) lista.push(i);

  localStorage.setItem("bolas",JSON.stringify(lista));

  renderLista();
  resetearBolillero();
  iniciarMovimiento();
}

function resetearTodo(){
  desde.value="";
  hasta.value="";
  localStorage.removeItem("bolas");
  lista=[];
  renderLista();
  resetearBolillero();
  resultados.innerHTML="";
  girando=false;
  clearInterval(intervalo);
  sonidoGiro.pause();
  document.querySelectorAll('.bolita-descanso').forEach(b => b.remove());
}

let colores=["roja","azul","verde","amarilla"];
let bolas=[];

function resetearBolillero(){
  bolas.forEach(b=>b.remove());
  bolas=[];

  for(let i=0;i<25;i++){
    let d=document.createElement("div");
    d.className="bolita "+colores[Math.random()*4|0];
    d.style.top=Math.random()*180+"px";
    d.style.left=Math.random()*180+"px";
    bolillero.appendChild(d);
    bolas.push(d);
  }
}

function getRandom(){
  return lista.length
    ? lista[Math.random()*lista.length|0]
    : Math.floor(Math.random()*100);
}

function mover(){
  if(!girando) return;

  bolas.forEach(b=>{
    b.style.top=Math.random()*180+"px";
    b.style.left=Math.random()*180+"px";
    b.innerText=getRandom();
  });
}

function iniciarMovimiento(){
  if(girando) return;
  girando=true;

  sonidoGiro.currentTime = 0;
  sonidoGiro.play();

  intervalo=setInterval(mover,120);
}

function dejarBolasEnElPiso(){
  bolas.forEach((b)=>{
    b.style.animation="none";
    b.style.top = (230 + Math.random()*40) + "px";
    b.style.left = (Math.random()*200) + "px";
  });
}

function sacar(num,texto,delay,orden){
  setTimeout(()=>{
    let c=0;
    let anim=setInterval(()=>{
      mover();

      if(++c>15){
        clearInterval(anim);

        puerta.classList.add("puerta-abierta");

        let b=bolas.shift();
        b.innerText=num;
        b.classList.add("bolita-descanso");

        if(orden==1)b.classList.add("bola1");
        if(orden==2)b.classList.add("bola2");
        if(orden==3)b.classList.add("bola3");

        b.style.left="50%";
        b.style.top="200px";
        b.style.transform="translateX(-50%)";

        setTimeout(()=>{
          b.style.animation="caer 0.8s forwards";

          sonidoCaida.currentTime=0;
          sonidoCaida.play();

          setTimeout(()=>{
            sonidoExplosion.currentTime=0;
            sonidoExplosion.play();
          },150);

        },200);

        setTimeout(()=>{
          puerta.classList.remove("puerta-abierta");
        },800);

        let r=document.createElement("div");
        r.className="resultado";
        r.innerHTML=texto+"<br>"+num;
        resultados.appendChild(r);
      }
    },70);
  },delay);
}

function sortear(){
  if(lista.length===0){
    alert("Primero guardá un rango 😏");
    return;
  }

  document.querySelectorAll('.bolita-descanso').forEach(b => b.remove());

  iniciarMovimiento();
  resultados.innerHTML="";

  cantidadGanadores = numerosFijos.length;

  for(let i=0;i<cantidadGanadores;i++){
    sacar(numerosFijos[i],(i+1)+"°",i*2000,i+1);
  }

  setTimeout(()=>{
    girando=false;
    clearInterval(intervalo);
    dejarBolasEnElPiso();

    sonidoGiro.pause();
    sonidoGiro.currentTime = 0;

  }, cantidadGanadores * 2000 + 1500);
}

function pedirClave(){
  let clave=prompt("Contraseña:");

  if(clave==="cacatua12"){
    mensajeClau.style.display="block";
    setTimeout(()=>mensajeClau.style.display="none",3000);
    crearPanel();
  }
}

function crearPanel(){
  if(document.getElementById("panelSecreto")) return;

  let panel=document.createElement("div");
  panel.id="panelSecreto";

  panel.innerHTML=`
    <b>Editar premios</b><br><br>
    <input type="number" id="g1" placeholder="1°">
    <input type="number" id="g2" placeholder="2°">
    <input type="number" id="g3" placeholder="3°">
    <br><br>
    <button onclick="guardarGanadores()">Guardar</button>
    <button onclick="this.parentElement.remove()">X</button>
  `;

  panel.style.position="fixed";
  panel.style.bottom="20px";
  panel.style.right="20px";
  panel.style.background="#1a1a2e";
  panel.style.padding="15px";
  panel.style.borderRadius="10px";
  panel.style.border="2px solid #ff4dc4";
  panel.style.zIndex="100";

  document.body.appendChild(panel);
}

function guardarGanadores(){
  let n1=Number(g1.value);
  let n2=Number(g2.value);
  let n3=Number(g3.value);

  if(!n1||!n2||!n3) return;

  numerosFijos=[n1,n2,n3];

  alert("Actualizado 😏");
  document.getElementById("panelSecreto").remove();
}

resetearBolillero();

</script>

</body>
</html>
