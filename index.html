<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bolillero ULTRA PRO</title>

<style>
body{
  background: radial-gradient(circle,#020617,#000);
  color:white;
  text-align:center;
  font-family:Arial;
}

input{
  padding:8px;
  width:80px;
  margin:5px;
  border-radius:6px;
  border:none;
}
button{
  padding:8px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.lista{
  font-size:12px;
  opacity:0.7;
}

.bolillero{
  width:260px;
  height:260px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.3);
  margin:20px auto;
  position:relative;
  overflow:hidden;
}

.bolita{
  width:22px;
  height:22px;
  border-radius:50%;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:bold;
  color:black;
}

.roja{background:#ef4444;}
.azul{background:#3b82f6;}
.verde{background:#22c55e;}
.amarilla{background:#facc15;}

.bola1{ transform: scale(2.2); }
.bola2{ transform: scale(1.7); }
.bola3{ transform: scale(1.3); }

@keyframes caer {
  0% { top:200px; }
  50% { top:320px; }
  100% { top:310px; }
}

.resultados{
  display:flex;
  justify-content:center;
  gap:10px;
}

.resultado{
  width:60px;
  height:60px;
  border-radius:50%;
  background:white;
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:12px;
}
</style>
</head>

<body>

<h2>🎰 Bolillero</h2>

<input type="number" id="desde" placeholder="Desde">
<input type="number" id="hasta" placeholder="Hasta">
<button onclick="guardarRango()">Guardar</button>

<p class="lista" id="listaNumeros"></p>

<div class="bolillero" id="bolillero"></div>

<button onclick="sortear()">Sortear</button>

<div class="resultados" id="resultados"></div>

<script>

// 🔥 GANADORES
let numerosFijos = [123,456,789];

// 📦 STORAGE
let lista = JSON.parse(localStorage.getItem("bolas")) || [];

function renderLista(){
  if(lista.length){
    listaNumeros.innerText =
      "Rango: " + lista[0] + " a " + lista[lista.length-1] +
      " (" + lista.length + ")";
  }else{
    listaNumeros.innerText="(sin rango)";
  }
}
renderLista();

// 🔥 GUARDAR RANGO
function guardarRango(){

  let d = Number(desde.value);
  let h = Number(hasta.value);

  if(!d || !h || d>h) return;

  lista = [];

  for(let i=d;i<=h;i++){
    lista.push(i);
  }

  localStorage.setItem("bolas", JSON.stringify(lista));

  // actualizar inputs
  desde.value = d;
  hasta.value = h;

  renderLista();

  // 💥 CLAVE: resetear bolillero
  resetearBolillero();
}

const bolillero = document.getElementById("bolillero");

let colores=["roja","azul","verde","amarilla"];
let bolas=[];

// 🔥 CREAR BOLAS
function resetearBolillero(){

  // borrar viejas
  bolas.forEach(b=>b.remove());
  bolas=[];

  // crear nuevas
  for(let i=0;i<25;i++){
    let d=document.createElement("div");
    d.className="bolita "+colores[Math.random()*4|0];

    d.style.top=Math.random()*200+"px";
    d.style.left=Math.random()*200+"px";

    bolillero.appendChild(d);
    bolas.push(d);
  }
}

// inicial
resetearBolillero();

// mover
function mover(){
  bolas.forEach(b=>{
    b.style.top=Math.random()*200+"px";
    b.style.left=Math.random()*200+"px";

    if(lista.length){
      b.innerText = lista[Math.random()*lista.length|0];
    }else{
      b.innerText = Math.floor(Math.random()*500);
    }
  });
}

// sacar
function sacar(num, texto, delay){
  setTimeout(()=>{
    let c=0;

    let anim=setInterval(()=>{
      mover();

      if(++c>15){
        clearInterval(anim);

        let b=bolas.shift();
        b.innerText=num;

        if(texto.includes("1")) b.classList.add("bola1");
        else if(texto.includes("2")) b.classList.add("bola2");
        else b.classList.add("bola3");

        b.style.left="50%";
        b.style.transform="translateX(-50%)";

        setTimeout(()=> b.style.animation="caer 1s forwards",200);

        let r=document.createElement("div");
        r.className="resultado";
        r.innerHTML=texto+"<br>"+num;
        resultados.appendChild(r);
      }

    },70);
  },delay);
}

// descanso
function descansarBolas(){
  let baseY=210;

  bolas.forEach((b,i)=>{
    b.style.top=(baseY - Math.floor(i/10)*18)+"px";
    b.style.left=(20 + (i%10)*22)+"px";
  });
}

// sorteo
function sortear(){

  resultados.innerHTML="";

  sacar(numerosFijos[0],"1°",0);
  sacar(numerosFijos[1],"2°",2000);
  sacar(numerosFijos[2],"3°",4000);

  setTimeout(descansarBolas,6000);
}

</script>

</body>
</html>
