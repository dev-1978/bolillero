<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🎰 Casino Clau - Control Total</title>

<style>
body{
  background:linear-gradient(135deg,#1a1a2e,#2d1b4e,#1a1a2e);
  color:#eee;
  text-align:center;
  font-family:Arial;
  overflow-x: hidden;
}

h2{ color:#ff4dc4; cursor:pointer; user-select: none; margin-bottom: 10px; }

/* Panel Secreto */
#panelControl {
  display: none;
  background: rgba(255, 77, 196, 0.1);
  border: 1px dashed #ff4dc4;
  padding: 15px;
  width: 300px;
  margin: 10px auto;
  border-radius: 15px;
}

input{
  padding:10px;
  width:80px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#2a2a3d;
  color:white;
  text-align: center;
}

button{
  padding:10px 18px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#a64dff,#ff4dc4);
  color:white;
  cursor:pointer;
  font-weight: bold;
}

.reset{ background:#555; }

.bolillero{
  width:260px;
  height:260px;
  border-radius:50%;
  border:3px solid #ff4dc4;
  margin:20px auto;
  position:relative;
  overflow:hidden;
  background: rgba(0,0,0,0.3);
  box-shadow: 0 0 20px rgba(255, 77, 196, 0.2);
}

#puerta{
  width:60px;
  height:25px;
  background:#222;
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  border-radius:0 0 10px 10px;
  transition:0.3s;
  z-index: 10;
}

.puerta-abierta{ height:5px; }

.bolita{
  width:24px;
  height:24px;
  border-radius:50%;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:bold;
  color:black;
  box-shadow: inset -2px -2px 4px rgba(0,0,0,0.4);
}

.roja{background:#ff4dc4;}
.azul{background:#a64dff;}
.verde{background:#ccc;}
.amarilla{background:#888;}

.bola1{transform:scale(2.2) translateX(-25%);}
.bola2{transform:scale(1.7) translateX(-30%);}
.bola3{transform:scale(1.3) translateX(-40%);}

@keyframes caer{
  0%{bottom:40px; opacity: 1;}
  100%{bottom:-60px; opacity: 0;}
}

.resultados{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top: 50px;
  min-height: 90px;
}

.resultado{
  width:80px;
  height:80px;
  border-radius:50%;
  background:white;
  color:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(255, 77, 196, 0.5);
  animation: aparecer 0.5s ease-out forwards;
}

@keyframes aparecer {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

#statusRango { font-size: 0.9em; color: #aaa; margin: 10px; }
</style>
</head>

<body>

<h2 ondblclick="pedirClave()">🎰 Casino Clau</h2>

<div id="panelControl">
  <p style="color:#ff4dc4; margin:0 0 10px 0;">✨ Configurar Ganadores ✨</p>
  <input type="number" id="fijo1" placeholder="1°">
  <input type="number" id="fijo2" placeholder="2°">
  <input type="number" id="fijo3" placeholder="3°">
  <br>
  <button onclick="aplicarGanadores()" style="background:#444; font-size:12px;">Aplicar cambios</button>
</div>

<div>
  <input type="number" id="desde" placeholder="Desde">
  <input type="number" id="hasta" placeholder="Hasta">
  <button onclick="guardarRango()">Guardar Rango</button>
  <button class="reset" onclick="resetearTodo()">Reset</button>
</div>

<p id="statusRango">(sin rango definido)</p>

<div class="bolillero" id="bolillero">
  <div id="puerta"></div>
</div>

<button onclick="sortear()" style="font-size: 20px; padding: 15px 30px;">SORTEAR</button>

<div class="resultados" id="resultados"></div>

<script>
// Valores por defecto
let numerosFijos = [10, 20, 30]; 
let lista = JSON.parse(localStorage.getItem("bolas")) || [];
let girando = false;
let intervalo;
let bolasVisuales = [];

const bolillero = document.getElementById("bolillero");
const resultados = document.getElementById("resultados");
const puerta = document.getElementById("puerta");
const statusRango = document.getElementById("statusRango");

function renderLista() {
  statusRango.innerText = lista.length 
    ? "🎯 Rango: " + lista[0] + " al " + lista[lista.length-1] + " (" + lista.length + " bolas)"
    : "(sin rango definido)";
}
renderLista();

function guardarRango() {
  let d = Number(document.getElementById("desde").value);
  let h = Number(document.getElementById("hasta").value);
  if(!d || !h || d > h) { alert("Rango inválido"); return; }
  lista = [];
  for(let i=d; i<=h; i++) lista.push(i);
  localStorage.setItem("bolas", JSON.stringify(lista));
  renderLista();
  resetearBolillero();
}

function aplicarGanadores() {
  let g1 = Number(document.getElementById("fijo1").value);
  let g2 = Number(document.getElementById("fijo2").value);
  let g3 = Number(document.getElementById("fijo3").value);
  if(g1 && g2 && g3) {
    numerosFijos = [g1, g2, g3];
    alert("Ganadores configurados: " + numerosFijos.join(" - "));
    document.getElementById("panelControl").style.display = "none";
  } else {
    alert("Completá los 3 números");
  }
}

function pedirClave() {
  let clave = prompt("Contraseña de Administrador:");
  if(clave === "cacatua12") {
    document.getElementById("panelControl").style.display = "block";
  } else {
    alert("Acceso denegado");
  }
}

function resetearTodo() {
  localStorage.removeItem("bolas");
  lista = [];
  renderLista();
  resetearBolillero();
  resultados.innerHTML = "";
  girando = false;
  clearInterval(intervalo);
}

function resetearBolillero() {
  bolillero.querySelectorAll('.bolita').forEach(b => b.remove());
  bolasVisuales = [];
  let colores = ["roja", "azul", "verde", "amarilla"];
  for(let i=0; i<25; i++) {
    let d = document.createElement("div");
    d.className = "bolita " + colores[Math.floor(Math.random() * 4)];
    d.style.top = Math.random() * 180 + "px";
    d.style.left = Math.random() * 180 + "px";
    bolillero.appendChild(d);
    bolasVisuales.push(d);
  }
}

function mover() {
  if(!girando) return;
  bolasVisuales.forEach(b => {
    if(!b.dataset.sorteada) {
      b.style.top = Math.random() * 180 + "px";
      b.style.left = Math.random() * 180 + "px";
    }
  });
}

function sacar(num, texto, delay, orden) {
  setTimeout(() => {
    let c = 0;
    let animSorteo = setInterval(() => {
      if(++c > 15) {
        clearInterval(animSorteo);
        puerta.classList.add("puerta-abierta");

        // Seleccionamos una bola del montón
        let b = bolasVisuales[bolasVisuales.length - orden]; 
        if(!b) return;
        
        b.dataset.sorteada = "true";
        b.innerText = num;
        b.style.zIndex = "20";
        b.style.left = "50%";
        b.style.top = "210px";
        b.style.transform = "translateX(-50%)";

        if(orden==1) b.classList.add("bola1");
        if(orden==2) b.classList.add("bola2");
        if(orden==3) b.classList.add("bola3");

        setTimeout(() => {
          b.style.animation = "caer 0.8s forwards";
          setTimeout(() => {
            puerta.classList.remove("puerta-abierta");
            let r = document.createElement("div");
            r.className = "resultado";
            r.innerHTML = "<small style='color:#ff4dc4'>" + texto + "</small>" + num;
            resultados.appendChild(r);
          }, 400);
        }, 300);
      }
    }, 70);
  }, delay);
}

function sortear() {
  if(lista.length === 0) {
    alert("Primero definí el rango de números");
    return;
  }
  resultados.innerHTML = "";
  resetearBolillero();
  girando = true;
  intervalo = setInterval(mover, 120);

  // 3 segundos (3000ms) entre cada salida
  for(let i=0; i<numerosFijos.length; i++) {
    sacar(numerosFijos[i], (i+1) + "º Premio", i * 3000, i + 1);
  }

  setTimeout(() => {
    girando = false;
    clearInterval(intervalo);
  }, (numerosFijos.length * 3000) + 2000);
}

resetearBolillero();
</script>

</body>
</html>
