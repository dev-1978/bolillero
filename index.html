<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bolillero PRO - Pastel</title>

<style>
body{
  background:#f8f0fc;
  color:#2d1b3c;
  text-align:center;
  font-family:'Segoe UI', Arial, sans-serif;
}

/* inputs */
input{
  padding:8px;
  width:80px;
  margin:5px;
  border-radius:20px;
  border:2px solid #d9b8d9;
  background:#fff0f5;
  color:#4a2b4a;
  outline:none;
}
input:focus{
  border-color:#b38cb8;
}
button{
  padding:8px 15px;
  margin:5px;
  border:none;
  border-radius:20px;
  background:#b8a2c6;
  color:white;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}
button:hover{
  background:#9d7eb3;
  transform:scale(1.05);
}
.reset{ background:#f4a2a2; }
.reset:hover{ background:#e88282; }

.lista{
  font-size:12px;
  opacity:0.7;
  color:#5d3f6b;
}

/* bolillero */
.bolillero{
  width:300px;
  height:300px;
  border-radius:50%;
  border:3px solid #c4a5d1;
  margin:20px auto;
  position:relative;
  overflow:hidden;
  background:#faf3ff;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.bolita{
  width:22px;
  height:22px;
  border-radius:50%;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  color:#2d1b3c;
  font-weight:bold;
  transition:all 0.3s ease;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* Colores pasteles */
.rosa{background:#ffd1dc;}  /* rosa pastel */
.lila{background:#d9c2f0;}  /* lila pastel */
.menta{background:#c0e8d5;} /* menta pastel */
.durazno{background:#ffd8b5;} /* durazno pastel */

/* Tamaños especiales para ganadoras */
.bola-ganadora-1{
  transform:scale(3.5);
  z-index:10;
  font-size:18px;
  font-weight:bold;
  border:3px solid #ffa5c3;
  box-shadow:0 0 15px #ffb3c6;
}
.bola-ganadora-2{
  transform:scale(3);
  z-index:9;
  font-size:16px;
  font-weight:bold;
  border:3px solid #c9a9ff;
  box-shadow:0 0 15px #c9b3ff;
}
.bola-ganadora-3{
  transform:scale(2.5);
  z-index:8;
  font-size:14px;
  font-weight:bold;
  border:3px solid #a5e0c0;
  box-shadow:0 0 15px #b0e5c5;
}

@keyframes caer{
  0%{top:200px; opacity:1;}
  50%{top:320px; opacity:0.9;}
  100%{top:310px; opacity:1;}
}

.resultados{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.resultado{
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ffe5f1;
  color:#4a2b4a;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  border:3px solid #d9b8d9;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* mensaje secreto */
#mensajeClau{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#e6d1f2;
  color:#3d1f4d;
  padding:10px 20px;
  border-radius:30px;
  display:none;
  z-index:9999;
  border:2px solid #b692d6;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h2 ondblclick="pedirClave()" style="color:#6b4e7e; cursor:pointer;">🎰 Bolillero Pastel</h2>

<input type="number" id="desde" placeholder="Desde">
<input type="number" id="hasta" placeholder="Hasta">
<button onclick="guardarRango()">Guardar</button>
<button class="reset" onclick="resetearTodo()">Reset</button>

<p class="lista" id="listaNumeros"></p>

<div class="bolillero" id="bolillero"></div>

<button onclick="sortear()" style="background:#b8a2c6; padding:12px 30px; font-size:16px;">🎲 Sortear</button>

<div class="resultados" id="resultados"></div>

<div id="mensajeClau">
  ✨ Bienvenida Clau ✨ ya sé a qué viniste...
</div>

<script>

// 🔥 GANADORES
let numerosFijos = [123,456,789];

// STORAGE
let lista = JSON.parse(localStorage.getItem("bolas")) || [];

function renderLista(){
  if(lista.length){
    listaNumeros.innerText =
      "Rango: " + lista[0] + " a " + lista[lista.length-1] +
      " (" + lista.length + " números)";
  }else{
    listaNumeros.innerText="(sin rango)";
  }
}
renderLista();

// guardar rango
function guardarRango(){
  let d = Number(desde.value);
  let h = Number(hasta.value);

  if(!d || !h || d>h) return;

  lista=[];
  for(let i=d;i<=h;i++) lista.push(i);

  localStorage.setItem("bolas", JSON.stringify(lista));

  desde.value=d;
  hasta.value=h;

  renderLista();
  resetearBolillero();
}

// reset (NO toca ganadores)
function resetearTodo(){
  desde.value="";
  hasta.value="";
  localStorage.removeItem("bolas");
  lista=[];
  renderLista();
  resetearBolillero();
  resultados.innerHTML="";
}

const bolillero=document.getElementById("bolillero");

// Colores pasteles
let colores=["rosa","lila","menta","durazno"];
let bolas=[];

// crear bolas
function resetearBolillero(){
  bolas.forEach(b=>b.remove());
  bolas=[];

  for(let i=0;i<25;i++){
    let d=document.createElement("div");
    d.className="bolita "+colores[Math.floor(Math.random()*4)];

    d.style.top=Math.random()*200+50+"px";
    d.style.left=Math.random()*200+30+"px";

    bolillero.appendChild(d);
    bolas.push(d);
  }
}

resetearBolillero();

// mover
function mover(){
  bolas.forEach(b=>{
    b.style.top=Math.random()*200+50+"px";
    b.style.left=Math.random()*200+30+"px";
    b.innerText = lista.length ? lista[Math.floor(Math.random()*lista.length)] : Math.floor(Math.random()*500);
  });
}

// sacar (con tamaños especiales para ganadoras)
function sacar(num,texto,delay,orden){
  setTimeout(()=>{
    let c=0;
    let anim=setInterval(()=>{
      mover();
      if(++c>15){
        clearInterval(anim);

        let b=bolas.shift();
        b.innerText=num;

        // Asignar clase según orden (1° más grande, 2° mediano, 3° pequeño-grande)
        if(orden === 1){
          b.classList.add("bola-ganadora-1");
        } else if(orden === 2){
          b.classList.add("bola-ganadora-2");
        } else if(orden === 3){
          b.classList.add("bola-ganadora-3");
        }

        b.style.left="50%";
        b.style.transform="translateX(-50%)";

        setTimeout(()=>b.style.animation="caer 1s forwards",200);

        let r=document.createElement("div");
        r.className="resultado";
        r.innerHTML=texto+"<br><span style='font-size:20px;'>"+num+"</span>";
        resultados.appendChild(r);
      }
    },70);
  },delay);
}

// descanso
function descansarBolas(){
  let baseY=210;

  bolas.forEach((b,i)=>{
    b.style.top=(baseY - Math.floor(i/10)*18)+"px";
    b.style.left=(20 + (i%10)*22)+"px";
    b.style.animation="";
  });
}

// sorteo
function sortear(){
  resultados.innerHTML="";

  // Pasar el orden: 1° más grande, 2° mediano, 3° el siguiente
  sacar(numerosFijos[0],"1°",0,1);
  sacar(numerosFijos[1],"2°",2000,2);
  sacar(numerosFijos[2],"3°",4000,3);

  setTimeout(descansarBolas,6000);
}

// 🔐 PANEL SECRETO
function pedirClave(){
  let clave = prompt("Contraseña:");

  if(clave === "cacatua12"){
    mostrarMensajeClau();
    crearPanel();
  }else{
    alert("No es correcto 😏");
  }
}

function mostrarMensajeClau(){
  let m = document.getElementById("mensajeClau");
  m.style.display = "block";
  setTimeout(()=> m.style.display="none",3000);
}

function crearPanel(){
  if(document.getElementById("panelSecreto")) return;

  let panel=document.createElement("div");

  panel.id="panelSecreto";
  panel.style="position:fixed;bottom:20px;right:20px;background:#f2e2fa;padding:15px;border-radius:20px;z-index:9999;border:2px solid #c4a5d1;box-shadow:0 4px 15px rgba(0,0,0,0.2);color:#4a2b4a;";

  panel.innerHTML=`
    <b style="color:#6b4e7e;">🎨 Editar ganadoras</b><br><br>
    <input type="number" id="g1" placeholder="1°" style="width:60px;">
    <input type="number" id="g2" placeholder="2°" style="width:60px;">
    <input type="number" id="g3" placeholder="3°" style="width:60px;">
    <br><br>
    <button onclick="guardarGanadores()" style="background:#b8a2c6;">OK</button>
    <button onclick="this.parentElement.remove()" style="background:#f4a2a2;">X</button>
  `;

  document.body.appendChild(panel);
}

function guardarGanadores(){
  let n1=Number(g1.value);
  let n2=Number(g2.value);
  let n3=Number(g3.value);

  if(!n1 || !n2 || !n3) return;

  numerosFijos=[n1,n2,n3];

  alert("✅ ¡Números actualizados!");
  document.getElementById("panelSecreto").remove();
}

</script>

</body>
</html>
